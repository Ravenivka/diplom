<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="style.css"><link rel="stylesheet" href="team.css"><link rel="stylesheet" href="coffe.css">
</head>
<body>
    <style>
       .aut_container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 90vh;
            background-color: #404040;
       } 
       .form-style {
          padding: 13px 20px;
          padding-left: 55px;
          height: 50px;
          width: 500px;
          font-weight: 500;
          border-radius: 4px;
          font-size: 16px;
          line-height: 22px;
          letter-spacing: 0.5px;
          outline: none;
          color: #c4c3ca;
          background-color: #1f2029;
          border: none;
          -webkit-transition: all 200ms linear;
          transition: all 200ms linear;
          box-shadow: 0 4px 8px 0 rgba(21,21,21,.2);
        }
        .aut_btn {
            color: #c4c3ca;
            font-size: 20px;
            width: 500px;
            height: 50px;
            border: none;
            background-color: #1f2029;
            color: #c4c3ca;
        }
        .aut_btn:hover {
            background-color: #c4c3ca;
            color: #1f2029;
        }
        .aut_form {
            width: 50%;
            height: 50%;
            background-color: #1f2029;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
    <div class="container">
        <header class="row">
            <div class="row__start"> <h1 class="row__h1">КОФЕЙНЯ</h1></div>
            <div class="row__finish">
                <span class="row__span">Команда</span>
                <span class="row__span">Кофе</span>
                <span class="row__span">Отзывы</span>
                <span class="row__span">Контакты</span>
            </div>
            <div class="row__panel"> 
                <input class="row__panel_input" placeholder="e-mail" type="email" />  
                <button class="row__panel_button">
                   <svg viewBox="0 0 16 16" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" fill="#000000"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <path fill="#444" d="M7.3 14.2l-7.1-5.2 1.7-2.4 4.8 3.5 6.6-8.5 2.3 1.8z"></path> </g></svg>
                </button>
            </div>

        </header>
        <main class="main">
    <!--tut-->
            <div class="aut_container">
                <form class="aut_form" action="/check" method="post">
                  <div>
                    <input type="email" name="logemail" class="form-style" placeholder="Your Email" id="logemail" autocomplete="off"><br/>
                    <input type="password" name="logpass" class="form-style" placeholder="Your Password" id="logpass" autocomplete="off"><br/>
                    <p style="text-align:center"> <button class="aut_btn">OK</button> </p>
                    <span style="font-size:10px; color:red;text-align:center; width:100%; display:block;" id="error">тут будут ошибки</span>
                    </div>
                </form>
            </div>
        </main>
    <!--end-->
        <footer class="footer">
            <div class="panorama">
                <img alt="panorama" class="panorama__img" src="img/panorama.png" />
                <div class="shield">
                    <h1 class="shield__h1">Контакты</h1>
                    <h2 class="shield__h2">+7 999 555 55 55</h2>
                    <p class="shield__p2">coffe@shop.ru</p>
                    <p class="shield__p">623286, Свердл. обл. Ревда, Максима Горького, д. 20</p>
                </div>
            </div>
        </footer>
    </div>
</body>
</html>
